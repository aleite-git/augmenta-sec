name: Release
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run test:coverage
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: release-build
          path: dist/
          retention-days: 30

  github-release:
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: release-build
          path: dist/
      - name: Create tarball of build output
        run: tar -czf augmenta-sec-${{ github.ref_name }}.tar.gz dist/ package.json README.md
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: augmenta-sec-${{ github.ref_name }}.tar.gz
          body: |
            ## Installation

            ```bash
            npm install -g augmenta-sec@${{ github.ref_name }}
            ```

            Or via npx:
            ```bash
            npx augmenta-sec@${{ github.ref_name }} scan .
            ```

            [View on npm](https://www.npmjs.com/package/augmenta-sec/v/${{ github.ref_name }})
